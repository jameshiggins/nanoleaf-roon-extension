name: Android APK

# Builds the companion Android TV app (android/) into an installable APK you
# can download from the run's Artifacts and sideload onto the Shield.
on:
  push:
    branches: [main, master]
    paths: ['android/**', '.github/workflows/android.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle -p android assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nanoleaf-roon-visualizer-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
