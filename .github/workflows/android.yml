name: Android APK

# Builds the companion Android TV app (android/) into an installable APK you
# can download from the run's Artifacts and sideload onto the Shield.
on:
  push:
    branches: [main, master]
    paths: ['android/**', '.github/workflows/android.yml']
  workflow_dispatch:

permissions:
  contents: write   # publish the APK to a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle -p android assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk nanoleaf-roon-visualizer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanoleaf-roon-visualizer-apk
          path: nanoleaf-roon-visualizer.apk
          if-no-files-found: error

      # Publish to a rolling "latest" release so the Shield can download the APK
      # directly (e.g. via the Downloader app) from a stable URL, no login needed.
      - name: Publish to latest release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK build
          prerelease: true
          make_latest: false
          files: nanoleaf-roon-visualizer.apk
          body: >
            Auto-built Android TV companion app (debug APK).
            Download nanoleaf-roon-visualizer.apk below and sideload it onto your
            Shield — see docs/COMPANION-APP.md.
